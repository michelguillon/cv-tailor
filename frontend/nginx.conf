# cv-tailor frontend — nginx serving the built SPA + proxying /api → backend (SPEC §7.5).
# Same-origin: the browser only ever talks to :3000; nginx forwards /api/* to the
# backend container. proxy_buffering off is REQUIRED or SSE streams (run progress +
# HITL) buffer and never reach the browser (RFI entry 26; SPEC §7.5, §12.3).

server {
    listen 3000;
    server_name _;

    # Static bundle (Vite build output copied into the image).
    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown paths fall back to index.html (client-side tabs, no server routes).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived hashed assets can be cached hard; index.html must not be.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API + SSE → backend. No buffering, HTTP/1.1, long timeouts so the run/HITL
    # streams stay open for the duration of a tailoring run.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
