# cv-tailor — dev compose (SPEC §7.5).
# The project directory is bind-mounted so edits on the host are visible
# immediately and outputs/ + data/ persist on the host.
#
# Usage:
#   docker compose build
#   docker compose run --rm cli pytest tests/
#   docker compose run --rm cli python -m corpus.ingest --cv-dir data/cvs/
#   docker compose run --rm cli python -m tailor run --jd data/jd.txt --demo
services:
  cli:
    build: .
    volumes:
      - .:/app                       # edits on host visible immediately
    env_file: .env
    # Short-lived, interactive; entry command supplied per `docker compose run`.

  backend:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file: .env
    # The Web UI backend (SPEC §12). Run with the frontend: docker compose up backend frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev      # Vite dev server
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app               # edits on host visible immediately
      - /app/node_modules             # keep the image's node_modules over the bind-mount
    depends_on:
      - backend
    # → http://localhost:3000 ; proxies /api → backend:8000 (vite.config.ts)
