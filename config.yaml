# cv-tailor configuration (cv-tailor_SPEC.md §3.7, §3.8)
# Runtime behaviour is governed by a RunConfig loaded from this file. Any mode
# difference expressed as a config value is readable, testable, and adjustable
# without touching code (the Week 2 RunConfig pattern).

modes:
  demo:
    max_iterations: 1
    orchestrator_model: "claude-haiku-4-5"
    cost_cap_usd: 0.75

  full:
    max_iterations: 3
    orchestrator_model: "claude-sonnet-4-6"
    cost_cap_usd: 5.00
    full_mode_key: "${FULL_MODE_KEY}"   # env var, gitignored

# Fixed model roles (D-03). Provider is an implementation detail of each tool;
# the orchestrator never selects these directly.
models:
  jd_analysis: "mistral-small-latest"        # Mistral: extraction + embeddings
  embeddings: "mistral-embed"
  critique: "gpt-4o-mini"                     # OpenAI: harsher section critique
  validation: "claude-haiku-4-5"             # Anthropic: formatting gate + HITL interpret

# Convergence thresholds (D-05). Subject to calibration after first real run.
convergence:
  keyword_delta_threshold: 0.05
  critique_delta_threshold: 0.5

# Dynamic rubric safeguards (D-04).
rubric:
  max_additions_per_iteration: 2

# ChromaDB (D-03 R-03: metric is set at creation and immutable; encode in name).
chroma:
  collection: "cv_sections_cosine"
  metric: "cosine"
  persist_dir: "data/chroma"

# UI/report DISPLAY labels for CV corpus variants (F-41). The variant filenames embed
# the company a CV was tailored for (Airwallex, JPMC, Figma, Mistral); those target-company
# names must not surface to anyone viewing the UI. This is a display mapping only — the
# stored filename (the ChromaDB key, used for retrieval + delete) is unchanged. Keyed by
# filename stem (with/without .docx tolerated); unmapped CVs fall back to their stem.
cv_display_names:
  CV_Michel_Guillon_2026_AI: "CV_AI_Leadership"
  CV_Michel_Guillon_2026_Adtech_Consulting: "CV_Solutions_Consulting_Leadership"
  CV_Michel_Guillon_2026_Adtech_Product: "CV_Product_Leadership"
  CV_Michel_Guillon_2026_Airwallex: "CV_Fintech_Solutions_Leadership"
  CV_Michel_Guillon_2026_Figma: "CV_International_SC_Leadership"
  CV_Michel_Guillon_2026_JPMC: "CV_Enterprise_AI_Platform"
  CV_Michel_Guillon_2026_Mistral: "CV_AI_Deployment_&_Architecture"

# Retrieval / fit-assessment behaviour (Phase 1). PROVISIONAL — to be confirmed
# when retrieval is built/tested (Step 3) against real JDs.
retrieval:
  # Seniority ladder, low → high. Used to compute how far a JD's inferred
  # seniority is from a CV's `seniority` (a band, not an exact match).
  seniority_order: [senior, principal, director, vp]
  # Seniority is a SOFT preference (ranking signal), never a hard pre-filter
  # that can exclude a CV (D-23). Rationale: Application Engineer / Deployment
  # Specialist roles at AI-native companies often carry no clean seniority
  # signal — titled "Senior"/"Principal" but scoped director-equivalent — so a
  # hard filter would wrongly drop a strong generic CV. Especially true for
  # cv_type: generic, whose target_role deliberately spans levels.
  seniority_filter_mode:
    generic: soft
    job_specific: soft        # start soft; tighten only if false positives appear
  # Role is matched semantically (embeddings), not by exact string equality.
  role_match: semantic

# Canonical section list (SPEC §3.8, corrected by F-05/D-20). Order here is the
# default assembly order; per-CV order is governed by CVSection.position
# discovered at ingestion.
cv_sections:
  - header            # name + contact block (above Profile)
  - profile
  - skills
  - experience        # one CVSection per COMPANY: section_id = experience_<company_slug>
  - ai_projects       # absent from some CVs; prominent in AI-role CVs
  - education
  - languages         # present in this corpus
  - certifications    # absent from this corpus; kept for present-only assembly
  - interests

# Section-boundary vocabulary (D-19). A paragraph is a section header iff its
# normalised text matches one of these aliases AND it is visually elevated
# (size > body, Heading-styled, or bold) and not a bullet. Matching by title is
# robust where style/size are inconsistent across the corpus (F-04).
section_aliases:
  header: []                         # synthesised from the pre-Profile block, not title-matched
  profile: ["profile", "summary", "professional summary"]
  skills: ["core skills", "skills", "key skills", "technical skills"]
  experience: ["work experience", "experience", "professional experience", "employment"]
  ai_projects: ["technical & ai projects", "ai projects", "technical and ai projects", "technical projects"]
  education: ["education"]
  languages: ["languages"]
  certifications: ["certifications", "certificates", "certification"]
  interests: ["interests", "hobbies", "interests & hobbies"]

# Sections copied verbatim and excluded from the critique loop (D-13, D-20).
static_sections:
  - header
  - education
  - languages
  - certifications
  - interests
